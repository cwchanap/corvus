name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright-tests:
    name: Playwright Tests (Web)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Install dependencies
        run: bun install

      - name: Build web assets
        run: |
          bun --cwd apps/web run build
          bun --cwd apps/api run copy-assets

      - name: Setup local D1 database
        run: cd apps/api && bun run db:migrate

      - name: Install Playwright browsers
        run: cd packages/e2e && bunx playwright install --with-deps chromium

      - name: Start local Supabase
        run: |
          if [ ! -f supabase/config.toml ]; then
            supabase init
          fi
          supabase start

      - name: Configure local Supabase bindings for Wrangler
        run: |
          set -euo pipefail
          supabase status --output env > /tmp/supabase.env
          SUPABASE_URL="$(sed -n -e 's/^SUPA_API_URL=//p' -e 's/^SUPABASE_URL=//p' /tmp/supabase.env | head -n 1)"
          SUPABASE_ANON_KEY="$(sed -n -e 's/^SUPA_ANON_KEY=//p' -e 's/^SUPABASE_ANON_KEY=//p' -e 's/^SUPA_PUBLISHABLE_KEY=//p' /tmp/supabase.env | head -n 1)"
          if [ -z "${SUPABASE_URL}" ] || [ -z "${SUPABASE_ANON_KEY}" ]; then
            echo "Failed to read local Supabase URL or anon key."
            exit 1
          fi
          {
            echo "SUPABASE_URL=${SUPABASE_URL}"
            echo "SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}"
            echo "INSECURE_COOKIES=true"
          } > apps/api/.dev.vars

      - name: Run Playwright tests
        run: bun run test
        env:
          CI: true
          VITE_API_URL: http://localhost:5002/graphql
          VITE_API_BASE: http://localhost:5002
          VITE_WEB_BASE: http://localhost:5000

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: packages/e2e/playwright-report/
          retention-days: 14

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: packages/e2e/test-results/
          retention-days: 7
