name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright-tests:
    name: Playwright Tests (Web)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL || vars.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || vars.SUPABASE_ANON_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build web assets
        run: |
          bun --cwd apps/web run build
          bun --cwd apps/api run copy-assets

      - name: Setup local D1 database
        run: cd apps/api && bun run db:migrate

      - name: Install Playwright browsers
        run: cd packages/e2e && bunx playwright install --with-deps chromium

      - name: Detect Supabase credentials
        id: supabase
        run: |
          if [ -n "${SUPABASE_URL}" ] && [ -n "${SUPABASE_ANON_KEY}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "Supabase credentials detected for E2E."
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Supabase credentials are missing."
          fi

      - name: Configure Supabase bindings for Wrangler
        if: steps.supabase.outputs.available == 'true'
        run: |
          {
            echo "SUPABASE_URL=${SUPABASE_URL}"
            echo "SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}"
          } > apps/api/.dev.vars

      - name: Fail if missing credentials on main pushes
        if: github.event_name == 'push' && steps.supabase.outputs.available != 'true'
        run: |
          echo "Missing Supabase credentials (SUPABASE_URL / SUPABASE_ANON_KEY)."
          echo "Set them as repository secrets or variables for main-branch E2E runs."
          exit 1

      - name: Skip E2E on pull_request without credentials
        if: github.event_name == 'pull_request' && steps.supabase.outputs.available != 'true'
        run: |
          echo "::warning::Skipping E2E tests for this PR because Supabase credentials are unavailable."

      - name: Run Playwright tests
        if: steps.supabase.outputs.available == 'true'
        run: bun run test
        env:
          CI: true
          VITE_API_URL: http://localhost:5002/graphql
          VITE_API_BASE: http://localhost:5002
          VITE_WEB_BASE: http://localhost:5000

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: packages/e2e/playwright-report/
          retention-days: 14

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: packages/e2e/test-results/
          retention-days: 7
